name: secmail_crypto_flutter
description: Flutter/OpenPGP addon for secmail_crypto_sdk (openpgp plugin + secure storage).
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  # fl-start fork: path when monorepo is checked out; use git tag in CI without sibling clone.
  flutter_secure_storage:
    path: ../../../flutter_secure_storage/flutter_secure_storage
  openpgp: ^3.10.7
  secmail_crypto_sdk:
    path: ../..

dependency_overrides:
  flutter_secure_storage:
    path: ../../../flutter_secure_storage/flutter_secure_storage
  flutter_secure_storage_darwin:
    path: ../../../flutter_secure_storage/flutter_secure_storage_darwin
  flutter_secure_storage_linux:
    path: ../../../flutter_secure_storage/flutter_secure_storage_linux
  flutter_secure_storage_platform_interface:
    path: ../../../flutter_secure_storage/flutter_secure_storage_platform_interface
  flutter_secure_storage_web:
    path: ../../../flutter_secure_storage/flutter_secure_storage_web
  flutter_secure_storage_windows:
    path: ../../../flutter_secure_storage/flutter_secure_storage_windows

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
